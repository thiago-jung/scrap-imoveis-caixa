name: Scraper Leiloes Caixa RS

on:
  schedule:
    # 09:00 UTC = 06:00 em Porto Alegre (UTC-3, sem horário de verão no Brasil atualmente)
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow" no GitHub

permissions:
  contents: write   # necessário pra o job poder commitar o snapshot/html de volta no repo
  pages: write
  id-token: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar scraper (RS, filtro RMPA)
        run: python caixa_leiloes_scraper.py --outdir ./data --html-out ./index.html

      - name: Commitar snapshot e relatório novos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --cached --quiet && echo "Sem mudanças" || git commit -m "snapshot leiloes RS $(date +%F)"
          git push

      - name: Upload do relatório para o GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-pages:
    needs: run-scraper
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
